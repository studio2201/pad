name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Trigger the workflow on pushes to the main branch

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64,amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Set Docker tags
        id: docker_meta
        run: |
          LOWER_IMAGE_NAME=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          
          # Always add the version tag
          echo "VERSION_TAG=${LOWER_IMAGE_NAME}:${{ steps.package_version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          
          # Add branch-specific tags
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ADDITIONAL_TAG=${LOWER_IMAGE_NAME}:latest" >> $GITHUB_OUTPUT
            echo "Using tags: ${LOWER_IMAGE_NAME}:${{ steps.package_version.outputs.VERSION }}, ${LOWER_IMAGE_NAME}:latest"
          elif [ "${{ github.ref }}" = "refs/heads/testing" ]; then
            echo "ADDITIONAL_TAG=${LOWER_IMAGE_NAME}:testing" >> $GITHUB_OUTPUT
            echo "Using tags: ${LOWER_IMAGE_NAME}:${{ steps.package_version.outputs.VERSION }}, ${LOWER_IMAGE_NAME}:testing"
          else
            echo "Using tag: ${LOWER_IMAGE_NAME}:${{ steps.package_version.outputs.VERSION }}"
          fi

      - name: Build and Push Multi-Platform Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ steps.docker_meta.outputs.VERSION_TAG }}
            ${{ steps.docker_meta.outputs.ADDITIONAL_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1