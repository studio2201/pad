<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustPad - Simple Notes</title>
    
    <!-- Tell Trunk to copy the Assets folder directly into the dist output -->
    <link data-trunk rel="copy-dir" href="Assets"/>
    <link data-trunk rel="copy-file" href="service-worker.js"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="Assets/rustpad.svg">
    <link rel="alternate icon" type="image/png" href="Assets/rustpad.png">
    <link rel="apple-touch-icon" href="Assets/rustpad.png">
    <link rel="stylesheet" href="Assets/styles.css">
    <link rel="stylesheet" href="Assets/preview-styles.css">
    <link rel="manifest" href="Assets/manifest.json">
    <script>
        (function() { // Initialize theme immediately - Prevents theme flicker
            let theme = JSON.parse(localStorage.getItem('rustpad_theme') || localStorage.getItem('dumbpad_theme')) 
            if (!theme) {
                theme = 'dark';
            } 
            localStorage.setItem('rustpad_theme', JSON.stringify(theme));
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
</body>
</html>
